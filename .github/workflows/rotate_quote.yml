name: Rotate Quote

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate-quote:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Rotate quote in README
        run: |
          python <<'PY'
          from pathlib import Path
          import re
          import urllib.request
          import json

          readme_path = Path("README.md")

          if not readme_path.exists():
              raise SystemExit("README.md not found")

          # Fetch a random quote from Quotable API with tech/science tags
          tags = "technology|science|inspirational"
          url = f"https://api.quotable.io/random?tags={tags}&maxLength=150"
          try:
              with urllib.request.urlopen(url, timeout=10) as response:
                  data = json.loads(response.read().decode())
                  quote = f"{data['content']} — {data['author']}"
          except Exception:
              quote = "The science of today is the technology of tomorrow. — Edward Teller"

          content = readme_path.read_text(encoding="utf-8")
          pattern = r'<!--QUOTE_START-->.*?<!--QUOTE_END-->'
          replacement = f'<!--QUOTE_START-->\n*"{quote}"*\n<!--QUOTE_END-->'
          updated = re.sub(pattern, replacement, content, flags=re.DOTALL)
          readme_path.write_text(updated, encoding="utf-8")
          PY

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "Rotate quote"
          git push --force
